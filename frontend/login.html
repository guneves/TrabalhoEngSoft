<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veridit - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #8b2fc9; --purple-hover: #7221a8; --bg-light: #f8fafc; --text-dark: #0f172a; --text-muted: #64748b; --border: #cbd5e1; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #ffffff; color: var(--text-dark); min-height: 100vh; display: flex; flex-direction: column; }
        header { width: 100%; padding: 20px 40px; border-bottom: 1px solid #e2e8f0; }
        .logo { font-size: 24px; font-weight: 700; color: #1e1b4b; display: flex; align-items: center; gap: 8px; }
        .logo-icon { background: var(--purple); width: 24px; height: 18px; border-radius: 4px; display: inline-block; }
        .main-container { display: flex; flex: 1; }
        .form-side { flex: 1; padding: 60px 80px; display: flex; flex-direction: column; justify-content: center; max-width: 600px; }
        .image-side { flex: 1.2; background-color: #fae8ff; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .books-bg { width: 100%; height: 100%; max-height: 650px; background: url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=1000') center/cover; border-radius: 16px; filter: hue-rotate(60deg) saturate(1.5); }
        h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
        .link-purple { color: var(--purple); text-decoration: underline; cursor: pointer; }
        .profile-tabs { display: flex; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 24px; overflow: hidden; padding: 4px; background: var(--bg-light); }
        .tab-btn { flex: 1; border: none; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text-muted); border-radius: 6px; transition: 0.2s; }
        .tab-btn.active { background: var(--purple); color: #ffffff; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; background: var(--bg-light); }
        .btn-logar { width: 100%; padding: 14px; background: var(--purple); color: #ffffff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-logar:hover { background: var(--purple-hover); }
    </style>
</head>
<body>
    <header><div class="logo"><span class="logo-icon"></span> Veridit</div></header>
    <div class="main-container">
        <div class="form-side">
            <h1>Login</h1>
            <div class="subtitle">Insira seus dados para acessar sua conta. Caso não tenha conta <span class="link-purple" onclick="window.location.href='cadastro.html'">clique aqui</span></div>
            <div class="profile-tabs">
                <button id="l-adv" class="tab-btn" onclick="setPerfilLogin('Advogado')">Advogado</button>
                <button id="l-usr" class="tab-btn active" onclick="setPerfilLogin('Usuário')">Usuário</button>
            </div>
            <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="endereço@email.com"></div>
            <div class="form-group"><label>Senha</label><input type="password" id="login-password" placeholder="Digite sua senha"></div>
            <button class="btn-logar" onclick="executarLogin()">Logar</button>
        </div>
        <div class="image-side"><div class="books-bg"></div></div>
    </div>
    <script>
        const AUTH_BASE = window.ENV_AUTH_BASE || '/api/auth';
        let loginPerfil = 'Usuário';
        function setPerfilLogin(perfil) {
            loginPerfil = perfil;
            document.getElementById('l-adv').classList.toggle('active', perfil === 'Advogado');
            document.getElementById('l-usr').classList.toggle('active', perfil === 'Usuário');
        }

        async function executarLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            if (!email || !password) { alert('Por favor, preencha todos os campos.'); return; }
            
            try {
                const response = await fetch(`${AUTH_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, perfil: loginPerfil })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('veridit_token', data.token);
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('userName', data.name || email.split('@')[0]); 
                    localStorage.setItem('userPerfil', loginPerfil);
                    window.location.href = 'creditos.html';
                } else { alert(data.error || 'Credenciais inválidas para o perfil selecionado.'); }
            } catch (err) {
                console.error('[Login] Auth service inacessível:', err);
                alert('Serviço de autenticação indisponível. Tente novamente em instantes.');
            }
        }
    </script>
</body>
</html>
