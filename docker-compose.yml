version: '3.8'

services:
  # API Gateway
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - auth-service
      - payment-service
      - evidence-service

  # Microsserviço de Autenticação
  auth-service:
    build: ./auth-service
    environment:
      - DATABASE_URL=postgres://user:password@db_auth:5432/auth_db
      - DB_HOST=db_auth
      - DB_PORT=5432
      - DB_NAME=auth_db
      - DB_USER=user
      - DB_PASSWORD=password
      - JWT_SECRET=super_secret_key_faculdade
    depends_on:
      - db_auth

  # Microsserviço de Pagamentos
  payment-service:
    build: ./payment-service
    environment:
      - DATABASE_URL=postgres://user:password@db_payment:5432/payment_db
      - DB_HOST=db_payment
      - DB_PORT=5432
      - DB_NAME=payment_db
      - DB_USER=user
      - DB_PASSWORD=password
      - JWT_SECRET=super_secret_key_faculdade
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      db_payment:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  # Microsservico de Evidencias/Provas Digitais
  evidence-service:
    build: ./evidence-service
    environment:
      - DATABASE_URL=postgres://user:password@db_evidence:5432/evidence_db
      - DB_HOST=db_evidence
      - DB_PORT=5432
      - DB_NAME=evidence_db
      - DB_USER=user
      - DB_PASSWORD=password
      - JWT_SECRET=super_secret_key_faculdade
    depends_on:
      - db_evidence

  # Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Microsserviço de Notificações
  notification-service:
    build: ./notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    restart: on-failure

  # Banco de Dados da Autenticação
  db_auth:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data # <-- MAPEAMENTO DO VOLUME AQUI

  # Banco de Dados do Pagamento (Bancos separados isolam os microsserviços)
  db_payment:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payment_db
    ports:
      - "5434:5432"
    volumes:
      - payment_data:/var/lib/postgresql/data # <-- MAPEAMENTO DO VOLUME AQUI

  # Banco de Dados de Evidencias/Provas Digitais
  db_evidence:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: evidence_db
    ports:
      - "5435:5432"
    volumes:
      - evidence_data:/var/lib/postgresql/data

# DECLARAÇÃO GLOBAL DOS VOLUMES (No final do arquivo)
volumes:
  auth_data:
  payment_data:
  evidence_data:
